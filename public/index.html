<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zofri - Inicio</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/accessibility.js"></script>
  <script defer src="/js/app.js"></script>
  <script defer src="/js/auth.js"></script>
  <script defer src="/js/vendor.js"></script>
</head>
<body>
  <a class="skip-link" href="#maincontent">Saltar al contenido</a>
  <header class="topbar">
    <div class="left"><a href="/">Zofri</a></div>
    <div class="center"><input id="search" placeholder="Buscar productos..." /></div>
    <div class="right"><a id="userMenu" href="/login.html">Iniciar sesión</a>
      <div class="font-controls" role="group" aria-label="Controles de tamaño de fuente">
        <button id="decreaseFont" aria-label="Disminuir tamaño de letra">A-</button>
        <button id="resetFont" aria-label="Tamaño normal">A</button>
        <button id="increaseFont" aria-label="Aumentar tamaño de letra">A+</button>
      </div>
    </div>
  </header>

  <main id="maincontent">
    <h1 class="page-title">Bienvenido a Zofri</h1>
    <section id="products" class="grid" aria-live="polite"></section>
    <h2>Tiendas</h2>
    <section id="stores" class="stores-grid"></section>
  </main>

  <footer class="footer">Zofri - Centro Comercial</footer>
</body>
</html>
