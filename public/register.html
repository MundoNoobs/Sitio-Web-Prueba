<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro - Zofri</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/auth.js"></script>
</head>
<body>
  <main class="auth">
    <h1>Registro Usuario</h1>
    <form id="registerForm">
      <input id="firstName" placeholder="Nombre" />
      <input id="lastName" placeholder="Apellido" />
      <input id="rut" placeholder="RUT (ej: 12.345.678-K)" />
      <input id="address" placeholder="Dirección" />
      <input id="email" placeholder="Correo" />
      <input id="password" type="password" placeholder="Contraseña" />
      <button type="button" id="registerBtn">Registrarse</button>
    </form>
  </main>
</body>
</html>
