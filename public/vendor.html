<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel Vendedor - Zofri</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script defer src="/js/vendor.js"></script>
  <script defer src="/js/auth.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="left"><a href="/">Zofri</a></div>
    <div class="center"></div>
    <div class="right"><a id="userMenu" href="/login.html">Cerrar sesión</a></div>
  </header>
  <main class="vendor-panel">
    <h1>Mi Tienda</h1>
    <section>
      <h2>Configuración de la tienda</h2>
      <label>Nombre tienda</label>
      <input id="storeName" placeholder="Nombre tienda" />
      <label>Descripción</label>
      <textarea id="storeDescription" placeholder="Descripción de la tienda"></textarea>
      <label>URL foto</label>
      <input id="storePhoto" placeholder="URL imagen" />
      <button id="saveStoreBtn">Guardar tienda</button>
    </section>
    <section>
      <h2>Añadir Artículo</h2>
      <input id="addPhoto" placeholder="URL foto" />
      <input id="addName" placeholder="Nombre artículo" />
      <input id="addPrice" placeholder="Precio" />
      <button id="addProductBtn">Añadir</button>
    </section>

    <section>
      <h2>Mis Artículos</h2>
      <div id="vendorProducts" class="grid"></div>
    </section>
  </main>
</body>
</html>
